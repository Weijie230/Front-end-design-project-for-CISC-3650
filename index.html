<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
<title>Book Management</title>
</head>
<body>
<div class="container mt-4">
<h1 class="text-center mb-4">Reading Book List</h1>
<div class="card p-3 mb-4">
<h4>Add a Book</h4>
<input id="title" class="form-control mb-2" placeholder="Book Title">
<input id="author" class="form-control mb-2" placeholder="Author">
<input id="genre" class="form-control mb-2" placeholder="Genre">
<select id="status" class="form-control mb-2">
<option>To Read</option>
<option>In the middle of reading</option>
<option>Completed</option>
</select>
<select id="rating" class="form-control mb-2">
<option value="">Rating</option>
<option>1 Terrible</option>
<option>2 Poor</option>
<option>3 Fair</option>
<option>4 Good</option>
<option>5 Excellent</option>
</select>
<button onclick="addBook()" class="btn btn-primary w-100">Add Book</button>
</div>
<input id="search" class="form-control mb-3" placeholder="Search by title or author" onkeyup="searchBooks()">
<div id="bookList" class="row g-3"></div>
</div>
<script src="script.js"></script>
</body>
</html>
